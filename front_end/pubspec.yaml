name: trekking_app
description: A comprehensive trekking application for Nepal adventures
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  http: ^1.1.0
  dio: ^5.4.0
  image_picker: ^1.1.2
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # UI Components
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  intl: ^0.18.1
  
  # WebSocket for chat
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
